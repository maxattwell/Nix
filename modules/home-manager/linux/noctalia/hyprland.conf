# Hyprland Configuration

# Auto-start programs
exec-once = noctalia
exec-once = systemctl --user start hyprpolkitagent

# Cursor
env = HYPRCURSOR_THEME,rose-pine-hyprcursor

# Variables
$mod = SUPER
$terminal = exec, ghostty
$browser = exec, default-browser
$editor = exec, emacsclient -nc
$file_manager = exec, thunar
$session_menu = exec, noctalia msg panel-toggle session
$lock = exec, noctalia msg session lock
$launcher = exec, noctalia msg panel-toggle launcher
$settings = exec, noctalia msg settings-toggle
$control_center = exec, noctalia msg panel-toggle control-center
$notifications_toggle = exec, noctalia msg notification-dnd-toggle
$lighttheme = exec, noctalia msg theme-mode-set light
$darktheme = exec, noctalia msg theme-mode-set dark
$screenshot = exec, noctalia msg screenshot-region

$voiceinput = exec, $HOME/Nix/assets/bin/voice-input.sh

# Keybindings
bind = $mod, RETURN, $terminal
bind = $mod SHIFT, RETURN, $browser
bind = $mod, Q, killactive,
bind = $mod, E, $editor
bind = $mod, D, $file_manager
bind = $mod, ESCAPE, $lock
bind = $mod SHIFT, ESCAPE, $session_menu
bind = $mod, SPACE, $launcher
bind = $mod SHIFT, SPACE, $control_center
bind = $mod, comma, $settings
bind = $mod, F1, $darktheme
bind = $mod, F2, $lighttheme
bind = $mod SHIFT, S, $screenshot
bind = $mod, N, $notifications_toggle

bind = $mod, V, $voiceinput

# Focus Movement
bind = $mod, h, movefocus, l
bind = $mod, j, movefocus, d
bind = $mod, k, movefocus, u
bind = $mod, l, movefocus, r

# Window Movement
bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, j, movewindow, d
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, l, movewindow, r

# Special Workspace
bind = $mod, m, togglespecialworkspace, magic
bind = $mod SHIFT, m, movetoworkspace, special:magic

# Other Bindings
bind = $mod, p, workspace, previous
bind = $mod, o, layoutmsg, togglesplit
bind = $mod, f, togglefloating
 
# Tab navigation in grouped windows
bind = $mod, t, togglegroup
bind = $mod, TAB, changegroupactive, f
bind = $mod SHIFT, TAB, changegroupactive, b

# Workspace Switching
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move Windows to Workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Mouse Bindings
bindm = $mod, mouse:272, resizewindow
bindm = $mod SHIFT, mouse:272, movewindow

# Volume Bindings
bind = , XF86AudioRaiseVolume, exec, noctalia msg volume-up
bind = , XF86AudioLowerVolume, exec, noctalia msg volume-down
bind = , XF86AudioMute, exec, noctalia msg volume-mute

# Brightness (Noctalia)
bind = , XF86MonBrightnessUp, exec, noctalia msg brightness-up
bind = , XF86MonBrightnessDown, exec, noctalia msg brightness-down

# Media (Noctalia)
bind = , XF86AudioPlay, exec, noctalia msg media toggle
bind = , XF86AudioNext, exec, noctalia msg media next
bind = , XF86AudioPrev, exec, noctalia msg media previous

# Input Settings
input {
    natural_scroll = true
    touchpad {
        tap-to-click = true
        natural_scroll = true
        scroll_factor = 0.4
    }
}

# Touchpad gestures
gesture = 3, vertical, dispatcher, $control_center
gesture = 4, horizontal, workspace
gestures {
    workspace_swipe_distance = 100
    workspace_swipe_direction_lock_threshold = 1000
}

# General Settings
general {
    gaps_in = 0
    gaps_out = 0
    border_size = 0
}

# Dwindle Layout
dwindle {
    preserve_split = true
}

# Decorations
decoration {
    rounding = 0
    rounding_power = 4.0
    dim_inactive = true
    dim_strength = 0.18

    shadow {
        enabled = false
    }

    blur {
        enabled = true
        size = 8
        passes = 2
    }
}

layerrule {
  name = noctalia
  match:namespace = ^noctalia-(bar-.+|notification|dock|panel|attached-panel|osd)$
  ignore_alpha = 0.5
  blur = true
  blur_popups = true
}

# Window Rules
windowrule = float on, match:class com.gabm.satty
windowrule = float on, match:class ^(thunar|Thunar|org\.xfce\.Thunar)$
windowrule = center on, match:class ^(thunar|Thunar|org\.xfce\.Thunar)$

# Animations
animations {
    enabled = yes
    bezier = snap, 0.05, 0.9, 0.1, 1

    animation = windows, 1, 2, snap
    animation = windowsOut, 1, 2, snap
    animation = fade, 1, 1, default
    animation = workspaces, 1, 3, snap
    animation = border, 1, 1, default
    animation = borderangle, 1, 2, default
}

